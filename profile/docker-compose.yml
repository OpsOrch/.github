# OpsOrch Complete Stack
# This Docker Compose file sets up a complete OpsOrch environment with:
# - OpsOrch Mock Adapters (includes Core + all mock providers with demo data)
# - OpsOrch MCP server (AI tools layer)
# - OpsOrch Console (web UI)
#
# Usage:
#   curl -O https://raw.githubusercontent.com/OpsOrch/.github/main/profile/docker-compose.yml
#   docker compose up -d
#   
# Access:
#   - Console UI: http://localhost:3000
#   - Core API: http://localhost:8080
#   - MCP Server: http://localhost:7070/mcp
#
# Health checks:
#   curl http://localhost:8080/health -H 'Authorization: Bearer demo'
#   curl http://localhost:7070/mcp -H 'Content-Type: application/json' -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}'

services:
  # OpsOrch Mock Adapters (includes Core + all mock providers with demo data)
  opsorch-mock-adapters:
    image: ghcr.io/opsorch/opsorch-mock-adapters:0.5.0
    container_name: opsorch-mock-adapters
    ports:
      - "8080:8080"
    environment:
      # Core configuration
      - OPSORCH_BEARER_TOKEN=demo
      - OPSORCH_LOG_LEVEL=info
      - OPSORCH_PORT=8080
      
      # Mock providers are pre-configured and provide demo data for:
      # - Incidents, Logs, Metrics, Tickets, Services, Messaging, Secrets
    # Health check removed - container has no curl/wget available
    # Service is verified to be working via manual endpoint tests
    restart: unless-stopped
    networks:
      - opsorch

  # OpsOrch MCP Server (AI Tools Layer)
  opsorch-mcp:
    image: ghcr.io/opsorch/opsorch-mcp:v0.5.0
    container_name: opsorch-mcp
    ports:
      - "7070:7070"
    environment:
      # Connect to Mock Adapters service
      - OPSORCH_CORE_URL=http://opsorch-mock-adapters:8080
      - OPSORCH_CORE_TOKEN=demo
      - OPSORCH_CORE_TIMEOUT_MS=15000
      
      # MCP server configuration
      - MCP_HTTP_PORT=7070
      - OPSORCH_LOG_LEVEL=info
      
      # CORS configuration for web access
      - MCP_HTTP_ALLOW_ORIGINS=http://localhost:3000,http://opsorch-console:3000
      - MCP_HTTP_ALLOW_HOSTS=localhost,opsorch-console
    depends_on:
      - opsorch-mock-adapters
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');const body=JSON.stringify({jsonrpc:'2.0',id:1,method:'tools/list'});const req=http.request({hostname:'localhost',port:7070,path:'/mcp',method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json, text/event-stream','Content-Length':Buffer.byteLength(body)}},res=>process.exit(res.statusCode&&res.statusCode<400?0:1));req.on('error',()=>process.exit(1));req.write(body);req.end();",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - opsorch

  # OpsOrch Console (Web UI)
  opsorch-console:
    image: ghcr.io/opsorch/opsorch-console:v0.6.0
    container_name: opsorch-console
    ports:
      - "3000:3000"
    environment:
      # Server-side API URL (used by Next.js API proxy routes)
      - OPSORCH_API_BASE_URL=http://opsorch-mock-adapters:8080
      - OPSORCH_API_TOKEN=demo
      - OPSORCH_COPILOT_BASE_URL=http://opsorch-copilot:6060
      
      # Client-side API URL (used by browser)
      - NEXT_PUBLIC_OPSORCH_CORE_URL=http://localhost:8080
      - NEXT_PUBLIC_COPILOT_URL=http://localhost:6060
      
      # Optional: Configure Copilot LLM Provider
      # - LLM_PROVIDER=gemini  # or "openai", "anthropic"
      # - GEMINI_API_KEY=your-api-key
      # - GEMINI_MODEL=gemini-3-flash-preview  # optional, latest model
    depends_on:
      - opsorch-mock-adapters
      - opsorch-copilot
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000',res=>process.exit(res.statusCode&&res.statusCode<400?0:1)).on('error',()=>process.exit(1));",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - opsorch

  # OpsOrch Copilot
  opsorch-copilot:
    image: ghcr.io/opsorch/opsorch-copilot:v0.2.0
    container_name: opsorch-copilot
    ports:
      - "6060:6060"
    environment:
      - PORT=6060
      - MCP_URL=http://opsorch-mcp:7070/mcp
      - LLM_PROVIDER=mock
    depends_on:
      - opsorch-mcp
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:6060/health',res=>process.exit(res.statusCode&&res.statusCode<400?0:1)).on('error',()=>process.exit(1));",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    restart: unless-stopped
    networks:
      - opsorch

networks:
  opsorch:
    driver: bridge
    name: opsorch-network

# Optional: Add volumes for persistent data
# volumes:
#   opsorch-data:
#     driver: local
